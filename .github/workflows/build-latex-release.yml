name: Build LaTeX and attach PDF to release

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: paper/main.tex
          compiler: pdflatex

      - name: Put PDF next to .tex and commit to repo
        if: github.event_name == 'push'
        run: |
          cp main.pdf paper/main.pdf
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add paper/main.pdf
          git diff --staged --quiet || git commit -m "[skip ci] Build PDF"
          git push

      - name: Upload PDF to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: main.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
